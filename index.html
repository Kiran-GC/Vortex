<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vortex</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="topbar-main">
                <button class="brand-button" id="brandHomeButton" type="button">
                    <img src="./assets/vortex.svg" alt="Vortex Logo" class="vortex-logo">
                    <span class="brand-copy">
                        <strong>Vortex</strong>
                        <span class="brand-subtitle">After Effects utilities</span>
                    </span>
                </button>
                <div class="host-pill" id="hostStatus">Connecting to After Effects...</div>
            </div>
            <nav class="section-nav" id="sectionNav">
                <button class="section-link active" data-section="home">Home</button>
                <button class="section-link" data-section="text">Text</button>
                <button class="section-link" data-section="motion">Motion</button>
                <button class="section-link" data-section="layers">Layers</button>
                <button class="section-link" data-section="media">Media</button>
                <button class="section-link" data-section="templates">Templates</button>
                <button class="section-link" data-section="settings">Settings</button>
            </nav>
        </header>

        <main class="workspace">
            <header class="workspace-header">
                <div>
                    <p class="eyebrow" id="sectionEyebrow">Main menu</p>
                    <h2 id="sectionTitle">Vortex</h2>
                </div>
                <div class="workspace-actions" id="workspaceActions"></div>
            </header>

            <section class="workspace-body">
                <div class="result-banner hidden" id="resultBanner"></div>
                <div class="section-content" id="sectionContent"></div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="./CSInterface.js"></script>
    <script src="./js/store.js"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/host-bridge.js"></script>
    <script src="./js/command-client.js"></script>
    <script src="./js/modules/home.js"></script>
    <script src="./js/modules/text.js"></script>
    <script src="./js/modules/motion.js"></script>
    <script src="./js/modules/layers.js"></script>
    <script src="./js/modules/media.js"></script>
    <script src="./js/modules/templates.js"></script>
    <script src="./js/modules/settings.js"></script>
    <script src="./js/app-shell.js"></script>
    <script src="./js/main.js"></script>
</body>
</html>
